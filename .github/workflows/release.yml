name: Release

on:
  release:
    types: [published]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            target: ''
            name: 'project-packer-x64.exe'
            path: 'src-tauri/target/release/project-packer.exe'
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
            name: 'project-packer-aarch64.dmg'
            path: 'src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg'
          - platform: 'macos-latest'
            target: 'x86_64-apple-darwin'
            name: 'project-packer-x64.dmg'
            path: 'src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg'
          - platform: 'ubuntu-22.04'
            target: ''
            name: 'project-packer-x64.AppImage'
            path: 'src-tauri/target/release/bundle/appimage/*.AppImage'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Build (Windows)
        if: matrix.platform == 'windows-latest'
        run: npm run tauri build

      - name: Build (macOS)
        if: matrix.platform == 'macos-latest'
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Build (Linux AppImage)
        if: matrix.platform == 'ubuntu-22.04'
        run: npm run tauri build -- --bundle appimage

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.path }}
          tag: ${{ github.ref_name }}
